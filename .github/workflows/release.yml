name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.platform }}
    environment: dev  # 指定使用 dev 环境的 
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: macos-14
          #   platform: macos
          #   family: macos

          # - os: ubuntu-22.04
          #   platform: linux
          #   family: linux
          - os: windows-latest
            platform: windows
            family: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          cache-on-failure: true
          cache-targets: true
          cache-all-crates: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.family == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install

      # Prepare openclaw-bundle once for all platforms
      - name: Prepare openclaw-bundle
        run: |
          npm run prepare:openclaw-bundle
        env:
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"

      - name: Build installers (macOS)
        if: matrix.family == 'macos'
        env:
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          rustup target add x86_64-apple-darwin

          STAGE_DIR="release-stage/${{ matrix.platform }}"
          mkdir -p "$STAGE_DIR"

          # Build both architectures in parallel
          build_and_stage_macos_target() {
            local rust_target="$1"
            local node_arch="$2"
            local arch_alias="$3"

            OPENCLAW_BUNDLE_NODE_ARCH="$node_arch" npx tauri build --target "$rust_target" --bundles app,dmg

            local bundle_root="src-tauri/target/$rust_target/release/bundle"
            if [ ! -d "$bundle_root" ]; then
              bundle_root="src-tauri/target/release/bundle"
            fi
            if [ ! -d "$bundle_root" ]; then
              echo "No bundle directory found for target: $rust_target"
              exit 1
            fi

            local app_path
            app_path="$(find "$bundle_root/macos" -maxdepth 1 -name '*.app' | head -n 1)"
            if [ -z "$app_path" ]; then
              echo "No macOS app bundle generated for target: $rust_target"
              exit 1
            fi
            echo "Verifying app signature: $app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"

            local dmg_path
            dmg_path="$(find "$bundle_root/dmg" -maxdepth 1 -name '*.dmg' | head -n 1)"
            if [ -z "$dmg_path" ]; then
              echo "No DMG generated for target: $rust_target"
              exit 1
            fi

            local mount_dir
            mount_dir="$(mktemp -d)"
            hdiutil attach -nobrowse -mountpoint "$mount_dir" "$dmg_path"
            local app_in_dmg
            app_in_dmg="$(find "$mount_dir" -maxdepth 1 -name '*.app' | head -n 1)"
            if [ -z "$app_in_dmg" ]; then
              hdiutil detach "$mount_dir" || true
              echo "No app bundle found inside DMG for target: $rust_target"
              exit 1
            fi
            echo "Verifying app signature inside DMG: $app_in_dmg"
            codesign --verify --deep --strict --verbose=2 "$app_in_dmg"
            hdiutil detach "$mount_dir"

            local app_tgz
            app_tgz="$(find "$bundle_root/macos" -maxdepth 1 -name '*.app.tar.gz' | head -n 1)"
            if [ -z "$app_tgz" ]; then
              echo "No updater app tarball generated for target: $rust_target"
              exit 1
            fi
            local app_tgz_renamed="openclaw-desktop_${arch_alias}.app.tar.gz"
            cp "$app_tgz" "$STAGE_DIR/$app_tgz_renamed"
            if [ ! -f "$app_tgz.sig" ]; then
              echo "No updater app tarball signature generated for target: $rust_target"
              exit 1
            fi
            cp "$app_tgz.sig" "$STAGE_DIR/$app_tgz_renamed.sig"

            local dmg_basename
            dmg_basename="$(basename "$dmg_path")"
            if [ -e "$STAGE_DIR/$dmg_basename" ]; then
              echo "Duplicated DMG asset name: $dmg_basename"
              exit 1
            fi
            cp "$dmg_path" "$STAGE_DIR/$dmg_basename"
            if [ -f "$dmg_path.sig" ]; then
              cp "$dmg_path.sig" "$STAGE_DIR/$dmg_basename.sig"
            fi
          }

          # Run builds sequentially to avoid conflicts
          build_and_stage_macos_target "aarch64-apple-darwin" "arm64" "aarch64"
          build_and_stage_macos_target "x86_64-apple-darwin" "x64" "x64"

      - name: Build installers (Windows)
        if: matrix.family == 'windows'
        env:
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleRoot = "src-tauri/bundle/resources/openclaw-bundle"

          function Assert-StepSuccess {
            param([string]$Label)
            if ($LASTEXITCODE -ne 0) {
              throw "$Label failed with exit code $LASTEXITCODE"
            }
          }

          function Assert-OfflineBundleReady {
            param([string]$BundleRoot)
            $requiredPaths = @(
              "manifest.json",
              "openclaw.tgz",
              "node/node.exe",
              "npm/bin/npm-cli.js",
              "npm-cache"
            )
            foreach ($relativePath in $requiredPaths) {
              $candidate = Join-Path $BundleRoot $relativePath
              if (!(Test-Path $candidate)) {
                throw "Offline bundle path missing: $candidate"
              }
            }
            $prefixPath = Join-Path $BundleRoot "prefix"
            if (!(Test-Path $prefixPath)) {
              Write-Output "::warning title=Offline bundle prefix missing::$prefixPath"
            }

            $bundleSizeBytes = (Get-ChildItem -Path $BundleRoot -Recurse -File | Measure-Object -Property Length -Sum).Sum
            if ($null -eq $bundleSizeBytes -or $bundleSizeBytes -lt 50MB) {
              throw "Offline bundle suspiciously small: SizeBytes=$bundleSizeBytes Root=$BundleRoot"
            }
          }

          # Install WiX Toolset (with caching and faster download)
          Write-Output "Installing WiX Toolset..."
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $wixZip = "wix314-binaries.zip"
          $wixDir = "C:\wix314"
          
          if (!(Test-Path $wixDir)) {
            Write-Output "Downloading WiX Toolset..."
            # Use faster download with progress disabled
            Invoke-WebRequest -Uri $wixUrl -OutFile $wixZip -MaximumRetryCount 3 -RetryIntervalSec 5 -UseBasicParsing
            # Faster extraction
            Expand-Archive -Path $wixZip -DestinationPath $wixDir -Force
            Remove-Item $wixZip -Force
          } else {
            Write-Output "Using cached WiX Toolset at: $wixDir"
          }
          
          # Add WiX to PATH
          $env:PATH = "$wixDir;$env:PATH"  # Prepend for faster lookup
          Write-Output "WiX Toolset ready at: $wixDir"

          # Create bundle directory and copy openclaw-bundle
          Write-Output "Creating bundle directory..."
          $runtimeBundlesDir = "src-tauri/bundle"
          if (!(Test-Path $runtimeBundlesDir)) {
            New-Item -ItemType Directory -Path $runtimeBundlesDir -Force
          }
          
          # Copy openclaw-bundle to bundle
          Write-Output "Copying openclaw-bundle to bundle..."
          $runtimeBundleTarget = Join-Path $runtimeBundlesDir "openclaw-bundle"
          if (Test-Path $runtimeBundleTarget) {
            Remove-Item -Path $runtimeBundleTarget -Recurse -Force
          }
          Copy-Item -Path $bundleRoot -Destination $runtimeBundleTarget -Recurse -Force
          
          # Verify the copy was successful
          Assert-OfflineBundleReady -BundleRoot $runtimeBundleTarget
          Write-Output "Runtime bundle ready: $runtimeBundleTarget"

          # Build MSI with optimized settings
          $msiLog = "windows-msi-build.log"
          $msiReady = $true
          
          # Set environment variables for faster Rust compilation
          $env:CARGO_BUILD_JOBS = "4"
          $env:CARGO_NET_RETRY = "10"
          $env:CARGO_HTTP_MULTIPLEXING = "true"
          
          # Build with parallel jobs
          Write-Output "Building NSIS with parallel jobs..."
          npx tauri build --bundles nsis *>&1 | Tee-Object -FilePath $msiLog
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content $msiLog -Tail 120) -join "`n"
            $escaped = $tail.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::warning title=MSI build failed::$escaped"
            $msiReady = $false
          }

          if ($msiReady) {
            $nsisFile = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($null -eq $nsisFile) {
              Write-Output "::warning title=NSIS artifact missing::No Windows NSIS artifact found in bundle/nsis"
              $msiReady = $false
            } elseif ($nsisFile.Length -lt 50MB) {
              Write-Output "::warning title=NSIS artifact suspiciously small::File=$($nsisFile.Name), SizeBytes=$($nsisFile.Length)"
              $msiReady = $false
            }
          }

          if (-not $msiReady) {
            throw "NSIS build failed or produced invalid artifact"
          }

      - name: Build installers (Linux)
        if: matrix.family == 'linux'
        env:
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"
        run: |
          # Build DEB with optimized settings
          npx tauri build --bundles deb 

      - name: Upload macOS artifacts
        if: matrix.family == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          if-no-files-found: error
          path: release-stage/${{ matrix.platform }}/*

      - name: Upload Windows artifacts
        if: matrix.family == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*

      - name: Upload Linux artifacts
        if: matrix.family == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.sig

  release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify assets
        run: ls -R release-assets

      - name: Generate updater manifest
        run: |
          node scripts/generate-updater-manifest.mjs release-assets "${{ github.ref_name }}" "${{ github.repository }}"
          node -e 'const fs=require("node:fs");const m=JSON.parse(fs.readFileSync("release-assets/latest.json","utf8"));const req=["darwin-aarch64","darwin-x86_64"];const miss=req.filter(k=>!m.platforms||!m.platforms[k]);if(miss.length){console.error("Missing required macOS updater targets:",miss.join(", "));process.exit(1);}console.log("macOS updater targets OK:",req.join(", "));'
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/**