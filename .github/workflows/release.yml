name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenClaw Manager ${{ github.ref_name }}
          body: |
            ## 🦞 OpenClaw Manager ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | **Windows** (installer) | `.msi` or `.exe` |
            | **macOS** (Apple Silicon & Intel) | `.dmg` |
            | **Linux** | `.deb` or `.AppImage` |

            ### What's New
            - **Startup Speed Optimization:** Frontend elements now load concurrently. Replaced rigid blocking queries with lazy background loading, heavily reducing time-to-render.
            - **React Lazy Chunking:** Split the frontend JS bundles. Heavy components (Settings, API tools) load entirely on demand, severely lightening the payload.
            - **Concurrent Shell Environment Check:** Rust environment assertions (`node`, `git`, OpenClaw CLI) now evaluate in parallel async via `tokio`, cutting startup delay significantly.
            - **Next-Gen 2026 AI Models:** Formally bumped and integrated the newest developer API endpoints matching the absolute latest models out right now: Anthropic (Claude Opus/Sonnet 4.6), OpenAI (GPT-5.4, o3-mini), Google (Gemini 3.1 Pro/Flash-Lite), DeepSeek, Qwen (3.5 Plus/Max), MiniMax (M2.5), and Venice AI (Llama 3.3 Default).
            - **Hotfix (v0.0.19):** Restored the Ollama local AI provider configuration that was accidentally dropped in the previous update.

            See the [full changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          draft: true
          prerelease: false

  build:
    needs: create-release
    name: build-${{ matrix.platform }}
    environment: dev  # 指定使用 dev 环境的 
    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            family: macos
          - os: windows-latest
            platform: windows
            family: windows
          - os: ubuntu-22.04
            platform: linux
            family: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.family == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          
          # Install linuxdeploy for AppImage building
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy

      - name: Install npm dependencies
        run: npm install

      # Prepare openclaw-bundle once for all platforms
      - name: Prepare openclaw-bundle
        run: |
          npm run prepare:openclaw-bundle
        env:
          OPENCLAW_BUNDLE_SKIP_VERIFY: "1"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          updaterJsonPreferNsis: true

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify assets
        run: ls -R release-assets

      - name: Generate updater manifest
        run: |
          node scripts/generate-updater-manifest.mjs release-assets "${{ github.ref_name }}" "${{ github.repository }}"
          node -e 'const fs=require("node:fs");const m=JSON.parse(fs.readFileSync("release-assets/latest.json","utf8"));const req=["darwin-aarch64","darwin-x86_64"];const miss=req.filter(k=>!m.platforms||!m.platforms[k]);if(miss.length){console.error("Missing required macOS updater targets:",miss.join(", "));process.exit(1);}console.log("macOS updater targets OK:",req.join(", "));'
          cat release-assets/latest.json